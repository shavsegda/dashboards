<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Недельный замер</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #f5f4f0; color: #1a1a1a; line-height: 1.55; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; }

.progress { position: sticky; top: 0; background: #f5f4f0; padding: 12px 0 8px; z-index: 10; border-bottom: 1px solid #e2dfd6; }
.progress-track { max-width: 720px; margin: 0 auto; padding: 0 24px; }
.progress-bar { height: 3px; background: #e2dfd6; position: relative; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #1a1a1a; transition: width 0.3s ease; width: 0%; }
.progress-text { font-size: 12px; color: #888; margin-top: 6px; display: flex; justify-content: space-between; }

main { max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; }
h1 { font-size: 26px; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.01em; }
h2 { font-size: 20px; font-weight: 600; margin: 24px 0 8px; }
p { margin-bottom: 12px; color: #444; }
.lead { font-size: 16px; color: #555; margin-bottom: 24px; }
.note { font-size: 13px; color: #888; }

button { background: #1a1a1a; color: #fff; padding: 14px 28px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; font-family: inherit; font-weight: 500; }
button:hover { background: #333; }
button:disabled { background: #ccc; cursor: not-allowed; }
button.secondary { background: transparent; color: #1a1a1a; border: 1px solid #d4cfc2; padding: 12px 24px; }
button.secondary:hover { background: #ebe7dc; }
.actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }

.q-card { background: #fff; border: 1px solid #e2dfd6; border-radius: 10px; padding: 28px 24px; margin: 16px 0; }
.q-block { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
.q-text { font-size: 18px; line-height: 1.5; margin-bottom: 24px; font-weight: 500; }
.q-instr { font-size: 14px; color: #666; margin-bottom: 16px; font-style: italic; }
.q-options { display: grid; gap: 8px; }
.q-option { display: flex; align-items: center; padding: 14px 16px; border: 1px solid #e2dfd6; border-radius: 8px; cursor: pointer; transition: all 0.15s; background: #fff; user-select: none; }
.q-option:hover { border-color: #1a1a1a; background: #fafaf6; }
.q-option.selected { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }
.q-option-text { font-size: 15px; flex: 1; }

.result-card { background: #fff; border: 1px solid #e2dfd6; border-radius: 10px; padding: 24px; margin-bottom: 16px; }
.result-row { display: flex; align-items: baseline; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0ede6; }
.result-row:last-child { border-bottom: 0; }
.result-name { font-size: 14px; color: #666; }
.result-val { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
.result-status { font-size: 12px; padding: 4px 10px; border-radius: 4px; margin-left: 12px; }
.status-green  { background: #dcfce7; color: #166534; }
.status-yellow { background: #fef9c3; color: #854d0e; }
.status-orange { background: #ffedd5; color: #9a3412; }
.status-red    { background: #fee2e2; color: #991b1b; }

.history-row { background: #fff; border: 1px solid #e2dfd6; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 16px; font-size: 14px; }
.history-date { color: #888; min-width: 90px; }
.history-pills { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
.pill { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-variant-numeric: tabular-nums; }

.empty { text-align: center; padding: 40px 20px; color: #888; }
.sync-status { font-size: 12px; color: #4a8c5e; }
.sync-status.error { color: #b91c1c; }

@media (max-width: 600px) {
  main { padding: 24px 16px 80px; }
  h1 { font-size: 22px; }
  .q-card { padding: 20px 16px; }
  .q-text { font-size: 16px; }
}
</style>
</head>
<body>
<header class="progress" id="progressBar" style="display:none;">
  <div class="progress-track">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text"><span id="progressText">Начало</span><span id="progressCount"></span></div>
  </div>
</header>
<main id="app"></main>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
// === Telegram WebApp ===
const tg = window.Telegram?.WebApp;
if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }

const TELEGRAM_USER_ID = tg?.initDataUnsafe?.user?.id;
const TELEGRAM_FIRST_NAME = tg?.initDataUnsafe?.user?.first_name || "";

// === Идентификатор клиента ===
function getOrCreateLocalUid() {
  let id = localStorage.getItem("local_uid");
  if (!id) { id = "u" + Math.random().toString(36).slice(2, 12); localStorage.setItem("local_uid", id); }
  return id;
}
// Приоритет: 1) ?u=tg_XXX из URL (передаёт бот) 2) Telegram WebApp 3) anon LocalStorage
function getClientId() {
  const params = new URLSearchParams(window.location.search);
  const u = params.get('u');
  if (u) return u;
  if (TELEGRAM_USER_ID) return "tg_" + TELEGRAM_USER_ID;
  return "local_" + getOrCreateLocalUid();
}
const CLIENT_ID = getClientId();
const STORAGE_KEY = "weekly_v1_" + CLIENT_ID;

// === Supabase client ===
const SUPABASE_URL = "https://tsregyrxtmkxrxvpsvot.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_yppYfhMVGsvSrFRxDij81w_7fO-1VSo";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// === Данные тестов ===
const SCALE_WHO = [
  {label: 'Никогда', value: 0},
  {label: 'Иногда', value: 1},
  {label: 'Менее половины времени', value: 2},
  {label: 'Более половины времени', value: 3},
  {label: 'Большую часть времени', value: 4},
  {label: 'Всё время', value: 5}
];
const SCALE_PHQ_GAD = [
  {label: 'Совсем нет', value: 0},
  {label: 'Несколько дней', value: 1},
  {label: 'Более половины дней', value: 2},
  {label: 'Почти каждый день', value: 3}
];
const TESTS = [
  { code: 'WHO-5', title: 'Благополучие',
    instruction: 'Насколько каждое утверждение описывало твоё состояние за последние 2 недели?',
    scale: SCALE_WHO,
    questions: [
      'Я был жизнерадостным и в хорошем настроении',
      'Я чувствовал себя спокойным и расслабленным',
      'Я чувствовал себя активным и энергичным',
      'Я просыпался свежим и отдохнувшим',
      'Мой день был наполнен делами, которые мне интересны'
    ]
  },
  { code: 'PHQ-9', title: 'Настроение',
    instruction: 'Как часто за последние 2 недели тебя беспокоили следующие проблемы?',
    scale: SCALE_PHQ_GAD,
    questions: [
      'Мало интереса или удовольствия от занятий',
      'Подавленность, угнетённость или ощущение безнадёжности',
      'Проблемы с засыпанием, прерывистый сон или пересыпание',
      'Чувство усталости или упадка сил',
      'Плохой аппетит или переедание',
      'Плохое мнение о себе — что я неудачник, либо подвёл себя или семью',
      'Трудности с концентрацией внимания',
      'Замедленность в движениях или речи — или, наоборот, повышенная суетливость',
      'Мысли о том, что лучше было бы умереть, или о том, чтобы причинить себе вред'
    ]
  },
  { code: 'GAD-7', title: 'Тревога',
    instruction: 'Как часто за последние 2 недели тебя беспокоили следующие проблемы?',
    scale: SCALE_PHQ_GAD,
    questions: [
      'Чувство нервозности, тревоги или взвинченности',
      'Невозможность остановить или контролировать беспокойство',
      'Слишком сильное беспокойство о разных вещах',
      'Трудности с расслаблением',
      'Беспокойство настолько сильное, что трудно усидеть на месте',
      'Лёгкое раздражение или вспыльчивость',
      'Чувство страха, как будто может случиться что-то ужасное'
    ]
  }
];

// === Состояние ===
const state = {
  screen: 'welcome',
  testIdx: 0,
  questionIdx: 0,
  answers: {},
  totalQuestions: TESTS.reduce((s, t) => s + t.questions.length, 0),
  syncStatus: '', // 'syncing' | 'ok' | 'error'
  syncMessage: ''
};

let history = [];

// === Supabase: история ===
async function loadHistoryFromSupabase() {
  try {
    const { data, error } = await sb
      .from("weekly_assessments")
      .select("week_start, completed_at, who5_total, phq9_total, gad7_total, created_at")
      .eq("client_id", CLIENT_ID)
      .order("week_start", { ascending: false })
      .limit(20);
    if (error) {
      console.error("Supabase load failed:", error);
      return [];
    }
    return data || [];
  } catch (e) {
    console.error("Supabase load exception:", e);
    return [];
  }
}

// === Supabase: сохранение ===
async function saveToSupabase(record) {
  state.syncStatus = 'syncing';
  state.syncMessage = 'Сохраняю...';
  try {
    const { error } = await sb
      .from("weekly_assessments")
      .upsert({
        client_id: CLIENT_ID,
        week_start: record.week_start,
        completed_at: record.completed_at,
        status: 'completed',
        answers: record.answers,
        who5_total: record.who5_total,
        phq9_total: record.phq9_total,
        gad7_total: record.gad7_total,
        flags: record.flags
      }, { onConflict: "client_id,week_start" });
    if (error) {
      console.error("Supabase save error:", error);
      state.syncStatus = 'error';
      state.syncMessage = 'Не удалось сохранить в облаке: ' + (error.message || 'неизвестная ошибка');
      return false;
    }
    state.syncStatus = 'ok';
    state.syncMessage = 'Сохранено в облаке. Бот теперь видит результат.';
    return true;
  } catch (e) {
    console.error("Supabase save exception:", e);
    state.syncStatus = 'error';
    state.syncMessage = 'Ошибка сети: ' + e.message;
    return false;
  }
}

// === Прогресс ===
function answeredCount() { return Object.keys(state.answers).length; }
function updateProgress() {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  const count = document.getElementById('progressCount');
  if (state.screen !== 'question') { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  const pct = (answeredCount() / state.totalQuestions) * 100;
  fill.style.width = pct + '%';
  text.textContent = TESTS[state.testIdx].title;
  count.textContent = (answeredCount()) + ' / ' + state.totalQuestions;
}

// === Рендер ===
const app = document.getElementById('app');

function renderWelcome() {
  const inTelegram = !!tg;
  const tgIndicator = inTelegram
    ? `<p class="note" style="color:#0f7c3f;">✓ Telegram WebApp · client: ${CLIENT_ID}</p>`
    : `<p class="note" style="color:#a16207;">⚠ Открыто вне Telegram · client: ${CLIENT_ID}</p>`;
  app.innerHTML = `
    <h1>Недельный замер</h1>
    ${tgIndicator}
    <p class="lead">21 вопрос за 5–7 минут. Замеряем благополучие, настроение и тревогу. После — увидишь свой результат и динамику за все недели.</p>
    <p class="note">Бесплатно. Каждое воскресенье — новый замер. Все данные привязаны к твоему профилю в боте.</p>
    <div class="actions">
      <button onclick="start()">Начать</button>
      ${history.length ? '<button class="secondary" onclick="showHistory()">История</button>' : ''}
    </div>
  `;
  updateProgress();
}

function renderQuestion() {
  const test = TESTS[state.testIdx];
  const q = test.questions[state.questionIdx];
  const key = test.code + '_' + state.questionIdx;
  const selected = state.answers[key];
  app.innerHTML = `
    <div class="q-card">
      <div class="q-block">${test.code} · ${test.title}</div>
      ${state.questionIdx === 0 ? `<div class="q-instr">${test.instruction}</div>` : ''}
      <div class="q-text">${q}</div>
      <div class="q-options">
        ${test.scale.map(s => `
          <div class="q-option ${selected === s.value ? 'selected' : ''}" onclick="answer(${s.value})">
            <span class="q-option-text">${s.label}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="actions">
      ${(state.testIdx === 0 && state.questionIdx === 0) ? '' : '<button class="secondary" onclick="prev()">Назад</button>'}
    </div>
  `;
  updateProgress();
}

function renderResult(record) {
  const who = record.who5_total;
  const phq = record.phq9_total;
  const gad = record.gad7_total;
  const whoStatus = who > 50 ? ['green','норма'] : who >= 29 ? ['yellow','внимание'] : ['red','тревожно'];
  const phqStatus = phq < 5 ? ['green','минимально'] : phq < 10 ? ['yellow','лёгкая'] : phq < 15 ? ['orange','умеренная'] : ['red','тяжёлая'];
  const gadStatus = gad < 5 ? ['green','минимально'] : gad < 10 ? ['yellow','лёгкая'] : gad < 15 ? ['orange','умеренная'] : ['red','тяжёлая'];
  const suicideFlag = (record.answers && record.answers['PHQ-9_8']) >= 1;
  const syncBlock = state.syncStatus
    ? `<p class="sync-status${state.syncStatus === 'error' ? ' error' : ''}">${state.syncMessage}</p>`
    : '';
  app.innerHTML = `
    <h1>Твой замер</h1>
    <p class="lead">Запись от ${new Date(record.completed_at).toLocaleString('ru-RU', {dateStyle:'long', timeStyle:'short'})}</p>
    ${syncBlock}
    <div class="result-card">
      <div class="result-row">
        <div><div class="result-name">Благополучие · WHO-5</div><div class="note">Норма выше 50</div></div>
        <div><span class="result-val">${who}</span><span class="result-status status-${whoStatus[0]}">${whoStatus[1]}</span></div>
      </div>
      <div class="result-row">
        <div><div class="result-name">Настроение · PHQ-9</div><div class="note">Норма ниже 5</div></div>
        <div><span class="result-val">${phq}</span><span class="result-status status-${phqStatus[0]}">${phqStatus[1]}</span></div>
      </div>
      <div class="result-row">
        <div><div class="result-name">Тревога · GAD-7</div><div class="note">Норма ниже 5</div></div>
        <div><span class="result-val">${gad}</span><span class="result-status status-${gadStatus[0]}">${gadStatus[1]}</span></div>
      </div>
    </div>
    ${suicideFlag ? `
      <div class="result-card" style="border-color:#dc2626;background:#fef2f2;">
        <h2 style="color:#991b1b;">Важно</h2>
        <p>Ты отметил мысли о смерти или самоповреждении. Это сигнал, который не стоит игнорировать. Напиши Алексею или специалисту прямо сейчас.</p>
      </div>` : ''}
    ${history.length > 1 ? `
      <h2>Динамика</h2>
      <p class="note">Сравнение с прошлыми неделями</p>
      <div>${renderHistoryList(history)}</div>
    ` : '<p class="note">Это твой первый замер. Возвращайся через неделю — увидишь динамику.</p>'}
    <div class="actions">
      <button class="secondary" onclick="renderWelcome()">На главную</button>
      ${tg ? '<button onclick="closeApp()">Закрыть</button>' : ''}
    </div>
  `;
  updateProgress();
}

function renderHistoryList(records) {
  return records.slice().reverse().map(r => {
    const d = new Date(r.completed_at || r.week_start).toLocaleDateString('ru-RU', {day:'2-digit',month:'short'});
    const w = r.who5_total, p = r.phq9_total, g = r.gad7_total;
    const wColor = w > 50 ? 'green' : w >= 29 ? 'yellow' : 'red';
    const pColor = p < 5 ? 'green' : p < 10 ? 'yellow' : p < 15 ? 'orange' : 'red';
    const gColor = g < 5 ? 'green' : g < 10 ? 'yellow' : g < 15 ? 'orange' : 'red';
    return `
      <div class="history-row">
        <div class="history-date">${d}</div>
        <div class="history-pills">
          <span class="pill status-${wColor}">WHO ${w}</span>
          <span class="pill status-${pColor}">PHQ ${p}</span>
          <span class="pill status-${gColor}">GAD ${g}</span>
        </div>
      </div>
    `;
  }).join('');
}

function showHistory() {
  app.innerHTML = `
    <h1>История замеров</h1>
    <p class="lead">Все твои замеры за всё время.</p>
    ${history.length ? renderHistoryList(history) : '<div class="empty">Замеров пока нет.</div>'}
    <div class="actions"><button class="secondary" onclick="renderWelcome()">На главную</button></div>
  `;
  updateProgress();
}

function closeApp() { try { tg.close(); } catch (e) {} }

// === Действия ===
function start() {
  state.screen = 'question';
  state.testIdx = 0;
  state.questionIdx = 0;
  state.answers = {};
  state.syncStatus = '';
  state.syncMessage = '';
  renderQuestion();
}

function answer(value) {
  const test = TESTS[state.testIdx];
  const key = test.code + '_' + state.questionIdx;
  state.answers[key] = value;
  if (state.questionIdx < test.questions.length - 1) {
    state.questionIdx++;
  } else if (state.testIdx < TESTS.length - 1) {
    state.testIdx++;
    state.questionIdx = 0;
  } else {
    finish();
    return;
  }
  renderQuestion();
}

function prev() {
  if (state.questionIdx > 0) {
    state.questionIdx--;
  } else if (state.testIdx > 0) {
    state.testIdx--;
    state.questionIdx = TESTS[state.testIdx].questions.length - 1;
  }
  renderQuestion();
}

function getWeekStart() {
  const d = new Date();
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - (day - 1));
  return d.toISOString().slice(0, 10);
}

async function finish() {
  state.screen = 'result';
  let who = 0, phq = 0, gad = 0;
  for (let i = 0; i < 5; i++) who += (state.answers['WHO-5_' + i] || 0);
  who *= 4;
  for (let i = 0; i < 9; i++) phq += (state.answers['PHQ-9_' + i] || 0);
  for (let i = 0; i < 7; i++) gad += (state.answers['GAD-7_' + i] || 0);

  const record = {
    week_start: getWeekStart(),
    completed_at: new Date().toISOString(),
    who5_total: who,
    phq9_total: phq,
    gad7_total: gad,
    answers: { ...state.answers },
    flags: { suicide_risk: (state.answers['PHQ-9_8'] || 0) >= 1 }
  };

  // Локальная копия в стейте + LocalStorage (на всякий случай)
  try { localStorage.setItem(STORAGE_KEY + '_last', JSON.stringify(record)); } catch (e) {}

  // Сразу показать результат
  renderResult(record);

  // Параллельно — сохранить в Supabase
  const ok = await saveToSupabase(record);
  if (ok) {
    history = await loadHistoryFromSupabase();
    // Триггерим бота: пусть прочитает свежие данные и напишет осмысленный ответ.
    // Сами данные уже в Supabase — sendData нужен только как сигнал.
    if (tg && typeof tg.sendData === 'function') {
      try {
        tg.sendData(JSON.stringify({ action: 'weekly_done' }));
      } catch (e) {
        console.warn('sendData failed (not critical):', e);
      }
    }
  }
  renderResult(record);
}

// === СТАРТ ===
(async () => {
  history = await loadHistoryFromSupabase();
  renderWelcome();
})();
</script>
</body>
</html>
