<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Недельный замер</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --paper: #F4F2EC;
  --stone: #E8E5DC;
  --graphite: #1A1A1A;
  --graphite-90: rgba(26,26,26,0.9);
  --graphite-75: rgba(26,26,26,0.75);
  --graphite-65: rgba(26,26,26,0.65);
  --graphite-50: rgba(26,26,26,0.5);
  --graphite-30: rgba(26,26,26,0.3);
  --graphite-15: rgba(26,26,26,0.15);
  --graphite-08: rgba(26,26,26,0.08);
  --terracotta: #B85C38;
  --terracotta-tint: rgba(184,92,56,0.08);
  --alert: #B91C1C;
  --alert-tint: rgba(185,28,28,0.06);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: var(--font-sans); background: var(--paper); color: var(--graphite); line-height: 1.55; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { min-height: 100vh; }

.progress { position: sticky; top: 0; background: var(--paper); padding: 14px 0 10px; z-index: 10; border-bottom: 1px solid var(--graphite-08); }
.progress-track { max-width: 640px; margin: 0 auto; padding: 0 24px; }
.progress-bar { height: 2px; background: var(--graphite-08); position: relative; overflow: hidden; }
.progress-fill { height: 100%; background: var(--terracotta); transition: width 0.3s ease; width: 0%; }
.progress-text { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--graphite-50); margin-top: 8px; display: flex; justify-content: space-between; }

main { max-width: 640px; margin: 0 auto; padding: 40px 24px 80px; }
h1 { font-size: 34px; font-weight: 500; letter-spacing: -0.025em; line-height: 1.05; margin-bottom: 16px; }
h2 { font-size: 20px; font-weight: 500; letter-spacing: -0.015em; margin: 28px 0 10px; }
p { margin-bottom: 12px; color: var(--graphite-75); }
.lead { font-size: 17px; line-height: 1.5; color: var(--graphite-75); margin-bottom: 28px; max-width: 540px; }
.note { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--graphite-50); }
.note-soft { font-size: 13px; color: var(--graphite-65); text-transform: none; letter-spacing: normal; font-family: var(--font-sans); }

button { background: var(--graphite); color: var(--paper); padding: 14px 28px; border: none; border-radius: 0; font-size: 14px; cursor: pointer; transition: background 0.2s; font-family: var(--font-sans); font-weight: 500; letter-spacing: 0.02em; }
button:hover { background: var(--terracotta); }
button:disabled { background: var(--graphite-30); cursor: not-allowed; }
button.secondary { background: transparent; color: var(--graphite); border: 1px solid var(--graphite-30); padding: 13px 27px; }
button.secondary:hover { background: transparent; color: var(--terracotta); border-color: var(--terracotta); }
.actions { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; }

.q-card { background: transparent; border: none; padding: 0; margin: 0 0 8px; }
.q-block { font-family: var(--font-mono); font-size: 11px; font-weight: 400; color: var(--graphite-50); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 16px; }
.q-text { font-size: 22px; line-height: 1.25; margin-bottom: 20px; font-weight: 500; letter-spacing: -0.015em; }
.q-instr { font-size: 15px; color: var(--graphite-65); margin-bottom: 18px; line-height: 1.5; }
.q-options { display: grid; gap: 8px; }
.q-option { display: flex; align-items: center; padding: 16px 18px; border: 1px solid var(--graphite-15); cursor: pointer; transition: all 0.15s; background: transparent; user-select: none; }
.q-option:hover { border-color: var(--terracotta); color: var(--terracotta); }
.q-option.selected { border-color: var(--terracotta); background: var(--terracotta); color: var(--paper); }
.q-option-text { font-size: 15px; flex: 1; }

.result-card { background: transparent; border: 1px solid var(--graphite-08); padding: 0; margin-bottom: 24px; }
.result-row { display: flex; align-items: baseline; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--graphite-08); }
.result-row:last-child { border-bottom: 0; }
.result-name { font-size: 14px; color: var(--graphite); font-weight: 500; }
.result-norm { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--graphite-50); margin-top: 4px; }
.result-val { font-family: var(--font-mono); font-size: 26px; font-weight: 500; font-variant-numeric: tabular-nums; color: var(--graphite); }
.result-status { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 8px; margin-left: 12px; border: 1px solid; }
/* Семантика медицинских шкал сохранена, но в сдержанной палитре */
.status-green  { border-color: var(--graphite-30); color: var(--graphite-65); }
.status-yellow { border-color: var(--graphite-50); color: var(--graphite-75); }
.status-orange { border-color: var(--terracotta); color: var(--terracotta); }
.status-red    { border-color: var(--alert); color: var(--alert); background: var(--alert-tint); }

.alert-card { border: 1px solid var(--alert); background: var(--alert-tint); padding: 20px 22px; margin-bottom: 24px; }
.alert-card h2 { color: var(--alert); margin-top: 0; }
.alert-card p { color: var(--graphite); margin-bottom: 0; }

.history-row { background: transparent; border: none; border-bottom: 1px solid var(--graphite-08); padding: 14px 0; font-size: 14px; }
.history-row:last-child { border-bottom: 0; }
.history-date { font-family: var(--font-mono); color: var(--graphite-50); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.history-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.pill { font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; font-variant-numeric: tabular-nums; border: 1px solid; letter-spacing: 0.05em; }

.empty { text-align: center; padding: 48px 20px; color: var(--graphite-50); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
.sync-status { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--terracotta); margin-top: 12px; }
.sync-status.error { color: var(--alert); }

@media (max-width: 600px) {
  main { padding: 28px 20px 80px; }
  h1 { font-size: 28px; }
  .q-text { font-size: 19px; }
  .result-row { padding: 16px; }
  .result-val { font-size: 22px; }
}
</style>
</head>
<body>
<header class="progress" id="progressBar" style="display:none;">
  <div class="progress-track">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text"><span id="progressText">Начало</span><span id="progressCount"></span></div>
  </div>
</header>
<main id="app"></main>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
// === Telegram WebApp ===
const tg = window.Telegram?.WebApp;
if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }

const TELEGRAM_USER_ID = tg?.initDataUnsafe?.user?.id;
const TELEGRAM_FIRST_NAME = tg?.initDataUnsafe?.user?.first_name || "";

// === Идентификатор клиента ===
function getOrCreateLocalUid() {
  let id = localStorage.getItem("local_uid");
  if (!id) { id = "u" + Math.random().toString(36).slice(2, 12); localStorage.setItem("local_uid", id); }
  return id;
}
// Приоритет: 1) ?u=tg_XXX из URL (передаёт бот) 2) Telegram WebApp 3) anon LocalStorage
function getClientId() {
  const params = new URLSearchParams(window.location.search);
  const u = params.get('u');
  if (u) return u;
  if (TELEGRAM_USER_ID) return "tg_" + TELEGRAM_USER_ID;
  return "local_" + getOrCreateLocalUid();
}
const CLIENT_ID = getClientId();
const STORAGE_KEY = "weekly_v1_" + CLIENT_ID;

// === Supabase client ===
const SUPABASE_URL = "https://tsregyrxtmkxrxvpsvot.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_yppYfhMVGsvSrFRxDij81w_7fO-1VSo";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// === Данные тестов ===
const SCALE_WHO = [
  {label: 'Никогда', value: 0},
  {label: 'Иногда', value: 1},
  {label: 'Менее половины времени', value: 2},
  {label: 'Более половины времени', value: 3},
  {label: 'Большую часть времени', value: 4},
  {label: 'Всё время', value: 5}
];
const SCALE_PHQ_GAD = [
  {label: 'Совсем нет', value: 0},
  {label: 'Несколько дней', value: 1},
  {label: 'Более половины дней', value: 2},
  {label: 'Почти каждый день', value: 3}
];
const TESTS = [
  { code: 'WHO-5', title: 'Благополучие',
    instruction: 'Насколько каждое утверждение описывало твоё состояние за последние 2 недели?',
    scale: SCALE_WHO,
    questions: [
      'Я был жизнерадостным и в хорошем настроении',
      'Я чувствовал себя спокойным и расслабленным',
      'Я чувствовал себя активным и энергичным',
      'Я просыпался свежим и отдохнувшим',
      'Мой день был наполнен делами, которые мне интересны'
    ]
  },
  { code: 'PHQ-9', title: 'Настроение',
    instruction: 'Как часто за последние 2 недели тебя беспокоили следующие проблемы?',
    scale: SCALE_PHQ_GAD,
    questions: [
      'Мало интереса или удовольствия от занятий',
      'Подавленность, угнетённость или ощущение безнадёжности',
      'Проблемы с засыпанием, прерывистый сон или пересыпание',
      'Чувство усталости или упадка сил',
      'Плохой аппетит или переедание',
      'Плохое мнение о себе — что я неудачник, либо подвёл себя или семью',
      'Трудности с концентрацией внимания',
      'Замедленность в движениях или речи — или, наоборот, повышенная суетливость',
      'Мысли о том, что лучше было бы умереть, или о том, чтобы причинить себе вред'
    ]
  },
  { code: 'GAD-7', title: 'Тревога',
    instruction: 'Как часто за последние 2 недели тебя беспокоили следующие проблемы?',
    scale: SCALE_PHQ_GAD,
    questions: [
      'Чувство нервозности, тревоги или взвинченности',
      'Невозможность остановить или контролировать беспокойство',
      'Слишком сильное беспокойство о разных вещах',
      'Трудности с расслаблением',
      'Беспокойство настолько сильное, что трудно усидеть на месте',
      'Лёгкое раздражение или вспыльчивость',
      'Чувство страха, как будто может случиться что-то ужасное'
    ]
  }
];

// === Состояние ===
const state = {
  screen: 'welcome',
  testIdx: 0,
  questionIdx: 0,
  answers: {},
  totalQuestions: TESTS.reduce((s, t) => s + t.questions.length, 0),
  syncStatus: '', // 'syncing' | 'ok' | 'error'
  syncMessage: ''
};

let history = [];

// === Supabase: история ===
async function loadHistoryFromSupabase() {
  try {
    const { data, error } = await sb
      .from("weekly_assessments")
      .select("week_start, completed_at, who5_total, phq9_total, gad7_total, created_at")
      .eq("client_id", CLIENT_ID)
      .order("week_start", { ascending: false })
      .limit(20);
    if (error) {
      console.error("Supabase load failed:", error);
      return [];
    }
    return data || [];
  } catch (e) {
    console.error("Supabase load exception:", e);
    return [];
  }
}

// === Отправка боту через Telegram (надёжнее, чем fetch к Supabase из in-app браузера) ===
// Бот получит payload, запишет в Supabase сервисным ключом и сам ответит в чат.
function sendToBot(record) {
  if (!tg || typeof tg.sendData !== 'function') {
    state.syncStatus = 'error';
    state.syncMessage = 'Замер заполнен, но открой его через бота — иначе результат не сохранится.';
    return false;
  }
  try {
    tg.sendData(JSON.stringify({
      action: 'weekly_assessment',
      payload: {
        week_start: record.week_start,
        completed_at: record.completed_at,
        who5_total: record.who5_total,
        phq9_total: record.phq9_total,
        gad7_total: record.gad7_total,
        answers: record.answers,
        flags: record.flags
      }
    }));
    state.syncStatus = 'ok';
    state.syncMessage = 'Замер отправлен боту. Ответ придёт в чат через секунду.';
    return true;
  } catch (e) {
    console.error('sendData failed:', e);
    state.syncStatus = 'error';
    state.syncMessage = 'Не удалось отправить боту: ' + e.message;
    return false;
  }
}

// === Прогресс ===
function answeredCount() { return Object.keys(state.answers).length; }
function updateProgress() {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  const count = document.getElementById('progressCount');
  if (state.screen !== 'question') { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  const pct = (answeredCount() / state.totalQuestions) * 100;
  fill.style.width = pct + '%';
  text.textContent = TESTS[state.testIdx].title;
  count.textContent = (answeredCount()) + ' / ' + state.totalQuestions;
}

// === Рендер ===
const app = document.getElementById('app');

function renderWelcome() {
  const inTelegram = !!tg;
  const tgIndicator = inTelegram
    ? `<p class="note" style="color:var(--terracotta);">✓ Telegram WebApp · client: ${CLIENT_ID}</p>`
    : `<p class="note" style="color:var(--alert);">⚠ Открыто вне Telegram · client: ${CLIENT_ID}</p>`;
  app.innerHTML = `
    <h1>Недельный замер</h1>
    ${tgIndicator}
    <p class="lead">21 вопрос за 5–7 минут. Замеряем благополучие, настроение и тревогу. После — увидишь свой результат и динамику за все недели.</p>
    <p class="note">Бесплатно. Каждое воскресенье — новый замер. Все данные привязаны к твоему профилю в боте.</p>
    <div class="actions">
      <button onclick="start()">Начать</button>
      ${history.length ? '<button class="secondary" onclick="showHistory()">История</button>' : ''}
    </div>
  `;
  updateProgress();
}

function renderQuestion() {
  const test = TESTS[state.testIdx];
  const q = test.questions[state.questionIdx];
  const key = test.code + '_' + state.questionIdx;
  const selected = state.answers[key];
  app.innerHTML = `
    <div class="q-card">
      <div class="q-block">${test.code} · ${test.title}</div>
      ${state.questionIdx === 0 ? `<div class="q-instr">${test.instruction}</div>` : ''}
      <div class="q-text">${q}</div>
      <div class="q-options">
        ${test.scale.map(s => `
          <div class="q-option ${selected === s.value ? 'selected' : ''}" onclick="answer(${s.value})">
            <span class="q-option-text">${s.label}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="actions">
      ${(state.testIdx === 0 && state.questionIdx === 0) ? '' : '<button class="secondary" onclick="prev()">Назад</button>'}
    </div>
  `;
  updateProgress();
}

function renderResult(record) {
  const who = record.who5_total;
  const phq = record.phq9_total;
  const gad = record.gad7_total;
  const whoStatus = who > 50 ? ['green','норма'] : who >= 29 ? ['yellow','внимание'] : ['red','тревожно'];
  const phqStatus = phq < 5 ? ['green','минимально'] : phq < 10 ? ['yellow','лёгкая'] : phq < 15 ? ['orange','умеренная'] : ['red','тяжёлая'];
  const gadStatus = gad < 5 ? ['green','минимально'] : gad < 10 ? ['yellow','лёгкая'] : gad < 15 ? ['orange','умеренная'] : ['red','тяжёлая'];
  const suicideFlag = (record.answers && record.answers['PHQ-9_8']) >= 1;
  const syncBlock = state.syncStatus
    ? `<p class="sync-status${state.syncStatus === 'error' ? ' error' : ''}">${state.syncMessage}</p>`
    : '';
  app.innerHTML = `
    <h1>Твой замер</h1>
    <p class="lead">Запись от ${new Date(record.completed_at).toLocaleString('ru-RU', {dateStyle:'long', timeStyle:'short'})}</p>
    ${syncBlock}
    <div class="result-card">
      <div class="result-row">
        <div><div class="result-name">Благополучие · WHO-5</div><div class="result-norm">Норма выше 50</div></div>
        <div><span class="result-val">${who}</span><span class="result-status status-${whoStatus[0]}">${whoStatus[1]}</span></div>
      </div>
      <div class="result-row">
        <div><div class="result-name">Настроение · PHQ-9</div><div class="result-norm">Норма ниже 5</div></div>
        <div><span class="result-val">${phq}</span><span class="result-status status-${phqStatus[0]}">${phqStatus[1]}</span></div>
      </div>
      <div class="result-row">
        <div><div class="result-name">Тревога · GAD-7</div><div class="result-norm">Норма ниже 5</div></div>
        <div><span class="result-val">${gad}</span><span class="result-status status-${gadStatus[0]}">${gadStatus[1]}</span></div>
      </div>
    </div>
    ${suicideFlag ? `
      <div class="alert-card">
        <h2>Важно</h2>
        <p>Ты отметил мысли о смерти или самоповреждении. Это сигнал, который не стоит игнорировать. Напиши Алексею или специалисту прямо сейчас.</p>
      </div>` : ''}
    ${history.length > 1 ? `
      <h2>Динамика</h2>
      <p class="note">Сравнение с прошлыми неделями</p>
      <div>${renderHistoryList(history)}</div>
    ` : '<p class="note">Это твой первый замер. Возвращайся через неделю — увидишь динамику.</p>'}
    <div class="actions">
      <button class="secondary" onclick="renderWelcome()">На главную</button>
      ${tg ? '<button onclick="closeApp()">Закрыть</button>' : ''}
    </div>
  `;
  updateProgress();
}

function renderHistoryList(records) {
  // Словесные статусы для каждой шкалы — чтобы строка истории читалась как человеческий язык
  const whoWord = w => w > 50 ? 'хорошо' : w >= 29 ? 'средне' : 'мало';
  const phqWord = p => p < 5 ? 'ровно' : p < 10 ? 'просело' : p < 15 ? 'плохо' : 'тяжело';
  const gadWord = g => g < 5 ? 'спокойно' : g < 10 ? 'лёгкая' : g < 15 ? 'заметная' : 'сильная';

  return records.slice().reverse().map(r => {
    const d = new Date(r.completed_at || r.week_start).toLocaleDateString('ru-RU', {day:'2-digit',month:'short'});
    const w = r.who5_total, p = r.phq9_total, g = r.gad7_total;
    const wColor = w > 50 ? 'green' : w >= 29 ? 'yellow' : 'red';
    const pColor = p < 5 ? 'green' : p < 10 ? 'yellow' : p < 15 ? 'orange' : 'red';
    const gColor = g < 5 ? 'green' : g < 10 ? 'yellow' : g < 15 ? 'orange' : 'red';
    return `
      <div class="history-row">
        <div class="history-date">${d}</div>
        <div class="history-pills">
          <span class="pill status-${wColor}">Силы ${w} — ${whoWord(w)}</span>
          <span class="pill status-${pColor}">Настроение ${p} — ${phqWord(p)}</span>
          <span class="pill status-${gColor}">Тревога ${g} — ${gadWord(g)}</span>
        </div>
      </div>
    `;
  }).join('');
}

function showHistory() {
  app.innerHTML = `
    <h1>История замеров</h1>
    <p class="lead">Все твои замеры за всё время.</p>
    ${history.length ? renderHistoryList(history) : '<div class="empty">Замеров пока нет.</div>'}
    <div class="actions"><button class="secondary" onclick="renderWelcome()">На главную</button></div>
  `;
  updateProgress();
}

function closeApp() { try { tg.close(); } catch (e) {} }

// === Действия ===
function start() {
  state.screen = 'question';
  state.testIdx = 0;
  state.questionIdx = 0;
  state.answers = {};
  state.syncStatus = '';
  state.syncMessage = '';
  renderQuestion();
}

function answer(value) {
  const test = TESTS[state.testIdx];
  const key = test.code + '_' + state.questionIdx;
  state.answers[key] = value;
  if (state.questionIdx < test.questions.length - 1) {
    state.questionIdx++;
  } else if (state.testIdx < TESTS.length - 1) {
    state.testIdx++;
    state.questionIdx = 0;
  } else {
    finish();
    return;
  }
  renderQuestion();
}

function prev() {
  if (state.questionIdx > 0) {
    state.questionIdx--;
  } else if (state.testIdx > 0) {
    state.testIdx--;
    state.questionIdx = TESTS[state.testIdx].questions.length - 1;
  }
  renderQuestion();
}

function getWeekStart() {
  const d = new Date();
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - (day - 1));
  return d.toISOString().slice(0, 10);
}

async function finish() {
  state.screen = 'result';
  let who = 0, phq = 0, gad = 0;
  for (let i = 0; i < 5; i++) who += (state.answers['WHO-5_' + i] || 0);
  who *= 4;
  for (let i = 0; i < 9; i++) phq += (state.answers['PHQ-9_' + i] || 0);
  for (let i = 0; i < 7; i++) gad += (state.answers['GAD-7_' + i] || 0);

  const record = {
    week_start: getWeekStart(),
    completed_at: new Date().toISOString(),
    who5_total: who,
    phq9_total: phq,
    gad7_total: gad,
    answers: { ...state.answers },
    flags: { suicide_risk: (state.answers['PHQ-9_8'] || 0) >= 1 }
  };

  // Локальная копия (на случай, если пользователь захочет повторить отправку)
  try { localStorage.setItem(STORAGE_KEY + '_last', JSON.stringify(record)); } catch (e) {}

  // Сначала отправляем боту через Telegram-канал — это мгновенно и не зависит от сети.
  // Бот сам пишет в Supabase сервисным ключом и отвечает в чат.
  sendToBot(record);

  // Показываем результат с правильным sync-статусом
  renderResult(record);

  // Параллельно подтянем историю из Supabase (для блока «Динамика»).
  // Если сеть упадёт — не страшно, это только для отображения.
  loadHistoryFromSupabase().then(h => {
    history = h;
    if (state.screen === 'result') renderResult(record);
  }).catch(() => {});
}

// === СТАРТ ===
(async () => {
  history = await loadHistoryFromSupabase();
  renderWelcome();
})();
</script>
