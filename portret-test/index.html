* { box-sizing: border-box; margin: 0; padding: 0; }

body { padding: 0; min-height: 100vh; }

main { max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; }
h1 { font-size: 28px; font-weight: 600; margin-bottom: 16px; letter-spacing: -0.02em; }

.input-group label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
.input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #d4cfc2; border-radius: 6px; font-size: 16px; background: #fff; }
button { background: #1a1a1a; color: #fff; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.2s; font-family: inherit; }
button:hover { background: #333; }
button:disabled { background: #ccc; cursor: not-allowed; }
button.secondary { background: transparent; color: #1a1a1a; border: 1px solid #d4cfc2; }
button.secondary:hover { background: #ebe7dc; }
.actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
.item { background: #fff; border: 1px solid #e2dfd6; border-radius: 8px; padding: 24px; margin: 16px 0; }
.item-text { font-size: 17px; margin-bottom: 16px; line-height: 1.5; }
.item-options { display: grid; gap: 8px; }
.option { display: flex; align-items: center; padding: 10px 14px; border: 1px solid #e2dfd6; border-radius: 6px; cursor: pointer; transition: all 0.15s; background: #fff; }
.option:hover { border-color: #1a1a1a; background: #fafaf6; }
.option.selected { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }
.option input { margin-right: 12px; }
.option-text { font-size: 15px; }
.scale-row { background: #fff; border: 1px solid #e2dfd6; border-radius: 8px; padding: 16px 20px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.scale-row:hover { border-color: #1a1a1a; }
.scale-row.expanded { padding-bottom: 24px; }
.scale-row-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.scale-row-name { flex: 1; font-size: 15px; font-weight: 500; }
.scale-row-bar { flex: 2; height: 4px; background: #e2dfd6; border-radius: 2px; position: relative; min-width: 100px; }
.scale-row-bar-fill { height: 100%; background: #1a1a1a; border-radius: 2px; }
.scale-row-bar-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: #1a1a1a; border-radius: 50%; border: 2px solid #f5f4f0; }
.scale-row-value { width: 36px; text-align: right; font-weight: 600; font-size: 14px; font-variant-numeric: tabular-nums; }
.scale-detail { margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2dfd6; }
.scale-headline { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.scale-body { font-size: 15px; color: #444; margin-bottom: 12px; }
.scale-mirror { font-size: 15px; color: #777; font-style: italic; padding-left: 12px; border-left: 2px solid #ccc; }
.macro-group { background: #fafaf6; border: 1px solid #e2dfd6; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.macro-group-title { font-size: 17px; font-weight: 600; margin-bottom: 14px; }
.axis-title { font-size: 24px; font-weight: 700; margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 2px solid #1a1a1a; letter-spacing: -0.01em; }
.axis-desc { font-size: 14px; color: #666; margin-bottom: 16px; }
.report-header { text-align: center; margin-bottom: 40px; padding: 32px 0; border-bottom: 1px solid #e2dfd6; }
.report-name { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
.report-date { font-size: 14px; color: #777; }
.report-intro { font-size: 15px; color: #555; max-width: 580px; margin: 16px auto 0; }
.block-intro { background: #fff; padding: 32px 28px; border-radius: 10px; border: 1px solid #e2dfd6; margin-bottom: 24px; }
.block-intro-num { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
@media print {

  body { background: #fff; }

@media (max-width: 600px) {
  main { padding: 24px 16px 80px; }

  .item { padding: 16px; }
  .scale-row-header { flex-wrap: wrap; }
  .scale-row-bar { order: 3; flex: 1 0 100%; margin-top: 8px; }
}
</style>

function getOrCreateLocalUid() {
  let id = localStorage.getItem("local_uid");
  if (!id) {
    id = "u" + Math.random().toString(36).slice(2, 12);
    localStorage.setItem("local_uid", id);
  }
  return id;
}
const CLIENT_ID = TELEGRAM_USER_ID ? ("tg_" + TELEGRAM_USER_ID) : ("local_" + getOrCreateLocalUid());
const STORAGE_KEY = "portret_v3_" + CLIENT_ID;

// Supabase client
const SUPABASE_URL = "https://tsregyrxtmkxrxvpsvot.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_yppYfhMVGsvSrFRxDij81w_7fO-1VSo";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let state = {
  name: TELEGRAM_FIRST_NAME || "",
  startDate: "",
  screen: "welcome",
  blockIdx: 0,
  itemIdxInBlock: 0,
  answers: {},
};

let lastSyncedCount = 0;
let syncInFlight = false;

function saveStateLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

async function syncToSupabase(force) {
  if (syncInFlight) return;
  const total = Object.keys(state.answers).length;
  // Шлём в облако: либо завершили, либо прошло 10+ новых ответов
  if (!force && state.screen !== "results" && total - lastSyncedCount < 10) return;
  syncInFlight = true;
  try {
    const isCompleted = state.screen === "results";
    const payload = {
      client_id: CLIENT_ID,
      client_name: state.name || TELEGRAM_FIRST_NAME,
      status: isCompleted ? "completed" : "in_progress",
      answers: state.answers,
      test_version: "v2",
    };
    if (state.startDate) payload.created_at = state.startDate;
    if (isCompleted) {
      payload.completed_at = new Date().toISOString();
      try {
        const { percentiles } = calculateScores();
        payload.scale_scores = percentiles;
      } catch (e) {}
    }
    await sb.from("portraits").upsert(payload, { onConflict: "client_id" });
    lastSyncedCount = total;
  } catch (e) {
    console.error("Supabase sync failed:", e);
  } finally {
    syncInFlight = false;
  }
}

function saveState() {
  saveStateLocal();
  syncToSupabase(false);
}

async function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = Object.assign(state, JSON.parse(s));
  } catch(e) {}
  try {
    const { data } = await sb.from("portraits").select("*").eq("client_id", CLIENT_ID).maybeSingle();
    if (data && data.answers) {
      const cloudCount = Object.keys(data.answers).length;
      const localCount = Object.keys(state.answers).length;
      if (cloudCount > localCount) {
        state.answers = data.answers;
        state.name = data.client_name || state.name;
        if (data.created_at) state.startDate = data.created_at;
        if (data.status === "completed") state.screen = "results";
        else if (cloudCount > 0) state.screen = "item";
        lastSyncedCount = cloudCount;
        saveStateLocal();
      } else {
        lastSyncedCount = cloudCount;
      }
    }
  } catch (e) {
    console.error("Supabase load failed:", e);
  }
}

function resetState() {
  state = { name: TELEGRAM_FIRST_NAME || "", startDate: "", screen: "welcome", blockIdx: 0, itemIdxInBlock: 0, answers: {} };
  lastSyncedCount = 0;
  saveStateLocal();
  sb.from("portraits").delete().eq("client_id", CLIENT_ID).then(() => {}).catch(() => {});
  render();
}

function getBlockItemIndices(blockId) {
  const indices = [];
  ITEMS.forEach((it, i) => { if (it.b === blockId) indices.push(i); });
  const seed = blockId.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  return shuffleSeeded(indices, seed);
}

function shuffleSeeded(arr, seed) {
  const a = arr.slice(); let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function calculateScores() {
  const rawByScale = {}; const countByScale = {};
  Object.keys(SCALES).forEach(s => { rawByScale[s] = 0; countByScale[s] = 0; });

  ITEMS.forEach((it, i) => {
    const ans = state.answers[i]; if (ans === undefined) return;
    const block = BLOCKS.find(b => b.id === it.b);
    let score = ans;
    if (it.p === -1) score = (block.scaleMin + block.scaleMax) - ans;
    rawByScale[it.s] += score; countByScale[it.s] += 1;
  });

  // Центрирование PVQ-RR
  const pvqIndices = ITEMS.map((it,i)=> it.b==="pvq" ? i : -1).filter(i=>i>=0);
  const pvqAnswers = pvqIndices.map(i=>state.answers[i]).filter(a=>a!==undefined);
  const pvqMean = pvqAnswers.length ? pvqAnswers.reduce((a,b)=>a+b,0)/pvqAnswers.length : 0;

  const valScales = Object.keys(SCALES).filter(s => SCALES[s].a === "val");
  const finalScores = {};
  Object.keys(SCALES).forEach(s => {
    if (SCALES[s].a === "val") {
      finalScores[s] = countByScale[s] > 0 ? (rawByScale[s] / countByScale[s]) - pvqMean : 0;
    } else {
      finalScores[s] = rawByScale[s];
    }
  });

  const percentiles = {};
  Object.keys(finalScores).forEach(s => {
    const score = finalScores[s]; const norm = NORMS[s];
    if (norm && score !== undefined) {
      const z = (score - norm.m) / norm.s;
      percentiles[s] = Math.round(normalCdf(z) * 100);
    }
  });

  return { raw: finalScores, percentiles };
}

function normalCdf(z) {
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989423 * Math.exp(-z*z/2);
  let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
  return z > 0 ? 1 - p : p;
}

function getRangeKey(perc) {
  if (perc <= 30) return "low";
  if (perc >= 70) return "high";
  return "mid";
}

function render() {
  const app = document.getElementById("app");
  if (state.screen === "welcome") renderWelcome(app);
  else if (state.screen === "block-intro") renderBlockIntro(app);
  else if (state.screen === "item") renderItem(app);
  else if (state.screen === "results") renderResults(app);
  updateProgress(); saveState();
}

function updateProgress() {
  const total = ITEMS.length;
  const done = Object.keys(state.answers).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  if (state.screen === "welcome") {
    document.getElementById("progressText").textContent = "Начало";
    document.getElementById("progressCount").textContent = "";
  } else if (state.screen === "results") {
    document.getElementById("progressText").textContent = "Результаты";
    document.getElementById("progressCount").textContent = total + " / " + total;
  } else {
    document.getElementById("progressText").textContent = "Блок " + (state.blockIdx + 1) + " из 4";
    document.getElementById("progressCount").textContent = done + " / " + total;
  }
}

function renderWelcome(app) {
  const hasProgress = Object.keys(state.answers).length > 0;
  app.innerHTML = `
    <h1>Портрет</h1>
    <p class="lead">Психометрический срез: 58 шкал, 216 вопросов, около 30-37 минут.</p>
    <p>Тест из 4 блоков измеряет три оси:</p>
    <ul style="margin: 12px 0 24px 24px;">
      <li><strong>Стиль работы</strong> — устойчивые черты характера</li>
      <li><strong>Уязвимости</strong> — где система ломается под нагрузкой</li>
      <li><strong>Ценности</strong> — что вас по-настоящему двигает</li>
    </ul>
    <p>В конце вы увидите свой Портрет — личную страницу с шкалами и формулировками к каждой.</p>
    <p class="note">Прогресс сохраняется автоматически. Можно прерваться и вернуться позже.</p>
    <div class="input-group">
      <label>Ваше имя</label>
      <input type="text" id="nameInput" value="${state.name}" placeholder="Имя или Имя Фамилия">
    </div>
    <div class="actions">
      <button onclick="startTest()">${hasProgress ? "Продолжить" : "Начать"}</button>
      ${hasProgress ? '<button class="secondary" onclick="if(confirm(\'Точно начать заново? Прогресс будет потерян.\')) resetState()">Начать заново</button>' : ""}
    </div>
  `;
}

function startTest() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) { alert("Введите имя"); return; }
  state.name = name;
  if (!state.startDate) state.startDate = new Date().toISOString();
  const total = ITEMS.length;
  if (Object.keys(state.answers).length === total) {
    state.screen = "results";
  } else if (Object.keys(state.answers).length === 0) {
    state.screen = "block-intro"; state.blockIdx = 0; state.itemIdxInBlock = 0;
  } else {
    state.screen = "item";
  }
  render();
}

function renderBlockIntro(app) {
  const block = BLOCKS[state.blockIdx];
  const titles = { pvq: "Ценности", neo: "Стиль работы", sd3: "Тёмные грани", cope: "Защитные реакции" };
  app.innerHTML = `
    <div class="block-intro">
      <div class="block-intro-num">${block.title}</div>
      <h2 style="margin-top: 0;">${titles[block.id]}</h2>
      <p>${block.instr}</p>
      <p class="note">Вариантов ответа: ${block.scaleMax - block.scaleMin + 1}. Пунктов в блоке: ${ITEMS.filter(it=>it.b===block.id).length}.</p>
      <div class="actions"><button onclick="startBlock()">Начать блок</button></div>
    </div>
  `;
}

function startBlock() { state.screen = "item"; state.itemIdxInBlock = 0; render(); }

function renderItem(app) {
  const block = BLOCKS[state.blockIdx];
  const blockItems = getBlockItemIndices(block.id);
  const globalIdx = blockItems[state.itemIdxInBlock];
  const item = ITEMS[globalIdx];
  const currentAnswer = state.answers[globalIdx];
  const totalInBlock = blockItems.length;

  let optionsHtml = "";
  for (let v = block.scaleMin; v <= block.scaleMax; v++) {
    const labelIdx = v - block.scaleMin;
    const label = block.labels[labelIdx];
    const selected = currentAnswer === v ? "selected" : "";
    optionsHtml += `<label class="option ${selected}" onclick="selectAnswer(${globalIdx}, ${v})">
      <input type="radio" name="answer" ${currentAnswer===v?"checked":""}>
      <span class="option-text"><strong>${v}</strong> — ${label}</span>
    </label>`;
  }

  const isFirst = state.itemIdxInBlock === 0;
  const isLast = state.itemIdxInBlock === totalInBlock - 1;

  app.innerHTML = `
    <div class="block-intro-num">${block.title} · вопрос ${state.itemIdxInBlock + 1} из ${totalInBlock}</div>
    <div class="item">
      <div class="item-text">${item.t}</div>
      <div class="item-options">${optionsHtml}</div>
    </div>
    <div class="actions">
      ${!isFirst ? '<button class="secondary" onclick="prevItem()">Назад</button>' : ""}
    </div>
  `;
}

let autoAdvanceTimer = null;

function selectAnswer(globalIdx, value) {
  state.answers[globalIdx] = value;
  saveState();
  render();
  // Автопереход к следующему вопросу через 280мс — пользователь успевает увидеть выбор
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(() => {
    autoAdvanceTimer = null;
    if (state.screen === "item") nextItem();
  }, 280);
}

function prevItem() { if (state.itemIdxInBlock > 0) state.itemIdxInBlock--; render(); }

function nextItem() {
  const block = BLOCKS[state.blockIdx];
  const blockItems = getBlockItemIndices(block.id);
  if (state.itemIdxInBlock < blockItems.length - 1) {
    state.itemIdxInBlock++; render();
  } else {
    if (state.blockIdx < BLOCKS.length - 1) {
      state.blockIdx++; state.itemIdxInBlock = 0; state.screen = "block-intro";
    } else {
      state.screen = "results";
    }
    render();
  }
}

function renderResults(app) {
  const { percentiles } = calculateScores();
  const date = new Date(state.startDate).toLocaleDateString("ru-RU", {year:"numeric", month:"long", day:"numeric"});

  let html = `
    <div class="report-header">
      <div class="report-name">${state.name}</div>
      <div class="report-date">Портрет — ${date}</div>
      <p class="report-intro">Это срез устойчивых черт: как вы обычно действуете, где ломаетесь под нагрузкой и что вас двигает. Меняется медленно — раз в 3-5 лет имеет смысл переснять.</p>
    </div>
  `;

  ["style", "vuln", "val"].forEach(axisId => {
    const axis = STRUCTURE[axisId];
    html += `<div class="axis-title">${axis.name}</div><div class="axis-desc">${axis.desc}</div>`;
    axis.groups.forEach(group => {
      html += `<div class="macro-group"><div class="macro-group-title">${group.name}</div>`;
      group.scales.forEach(scaleId => {
        const perc = percentiles[scaleId] || 0;
        const range = getRangeKey(perc);
        const text = TEXTS[scaleId] && TEXTS[scaleId][range];
        if (!text) return;
        html += `<div class="scale-row" onclick="toggleScale(this)">
          <div class="scale-row-header">
            <div class="scale-row-name">${SCALES[scaleId].n}</div>
            <div class="scale-row-bar"><div class="scale-row-bar-fill" style="width:${perc}%"></div><div class="scale-row-bar-dot" style="left:${perc}%"></div></div>
            <div class="scale-row-value">${perc}</div>
          </div>
          <div class="scale-detail" style="display:none;">
            <div class="scale-headline">${text.h}</div>
            <div class="scale-body">${text.b}</div>
            ${text.m ? `<div class="scale-mirror">${text.m}</div>` : ""}
          </div>
        </div>`;
      });
      html += `</div>`;
    });
  });

  html += `
    <div style="margin-top: 48px; padding-top: 24px; border-top: 1px solid #e2dfd6; color: #777; font-size: 14px;">
      <p>Это карта, не диагноз. Куда с ней идти — отдельный разговор.</p>
      <p class="note" style="margin-top: 16px;">Числа — перцентили относительно общенаселенческих норм для каждого инструмента. Свою выборку клиентов мы накапливаем — через год добавится вторая шкала «среди наших».</p>
    </div>
    <div class="actions no-print" style="margin-top: 24px;">
      <button onclick="window.print()">Распечатать / сохранить как PDF</button>
      <button class="secondary" onclick="if(confirm('Начать заново? Все ответы будут стёрты.')) resetState()">Пройти заново</button>
    </div>
  `;
  app.innerHTML = html;
}

function toggleScale(el) {
  const detail = el.querySelector(".scale-detail");
  if (detail.style.display === "none") { detail.style.display = "block"; el.classList.add("expanded"); }
  else { detail.style.display = "none"; el.classList.remove("expanded"); }
}

async function init() {
  document.getElementById("app").innerHTML = '<p class="lead" style="margin-top: 32px;">Загружаю...</p>';
  await loadState();
  if (state.screen === "results") syncToSupabase(true);
  render();
}
init();
</script>
</body>
</html>
